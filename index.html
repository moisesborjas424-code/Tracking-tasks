<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset = "UTF-8">
    <meta name = "viewport" content = "width=device-width, initial-scale=1.0">
    <title>Task Tracker</title>
    <link rel = "stylesheet" href = "styles.css">

    <meta name="theme-color" content="#4CAF50">

    <meta name="description" content="A simple task tracker application to help you manage your daily tasks efficiently. Add, view, and delete tasks with ease.">

    <link rel="icon" href="favicon.ico" type="image/x-icon">
</head>
<style>
/* Global Layout */
body {
    margin: 0;
    padding: 0;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(to bottom right, #9b6c6c 0%, #668ecf 100%);
    min-height: 100vh;
}

/* Centered Content Wrapper */
.container {
    width: 100%;
    max-width: 800px;
    margin: 0 auto;
    padding: 20px;
}

/* Navbar */
.navbar {
    width: 98%;
    background-color: #333;
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: white;
    position: sticky;
    top: 0;
    z-index: 1000;
}
/* Logo */
.navbar .logo {
    font-size: 22px;
    font-weight: 700;
}
/* Navbar Links */
.nav-links {
    list-style: none;
    display: flex;
    gap: 20px;
}
/* Navbar Links */
.nav-links a {
    color: white;
    text-decoration: none;
    font-size: 16px;
}

.nav-links a:hover {
    color: #b3a9da;
}

/* Header */
.app-header {
    text-align: center;
    margin-top: 20px;
    color: white;
}

/* Card Layout */
.card {
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    margin-top: 25px;
}

/* Inputs */
.task-input-wrapper {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
}
/* Input Styles */
.task-input-wrapper input,
.task-input-wrapper select,
.task-input-wrapper button {
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}
/* Search Bar */
#searchBar {
    width: 98%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

/* Buttons */
button, .filter-btn {
    transition: 0.2s ease;
    font-weight: 600;
    cursor: pointer;
}
/* Hover Effect */
button:hover, .filter-btn:hover {
    transform: translateY(-2px);
    background-color: #3a5a99;
    color: white;
}
/* Active State */
button:active, .filter-btn:active {
    transform: scale(0.97);
}

/* Task List */
.task-list li {
    padding: 12px;
    border-bottom: 1px solid #eee;
    animation: fadeIn 0.25s ease-in-out;
}
/* Hover Effect for Task Items */
.task-list li:hover {
    background-color: #f7f7f7;
}

/* Animation Fix */
@keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
}
/* Progress Bar */
.progress-bar {
    width: 98%;
    height: 20px;
    background-color: #eee;
    border-radius: 10px;
    overflow: hidden;
}
/* Progress Fill */
.progress-fill {
    height: 100%;
    background-color: #181d18;
    width: 0%;
    transition: width 0.3s ease;
}

/* Stats */
.task-stats {
    display: flex;
    gap: 20px;
    margin-top: 25px;
}

/* Each Stat Box */
.stats-box {
    flex: 1;
    background: white;
    padding: 20px;
    border-radius: 12px;
    text-align: center;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

/* Footer */
.app-footer {
    text-align: center;
    padding: 20px;
    color: white;
    margin-top: 40px;
}

/* Responsive Design */
@media (max-width: 600px) {
    .task-input-wrapper {
        flex-direction: column;
    }

    .navbar {
        flex-direction: column;
        text-align: center;
    }

    .nav-links {
        flex-direction: column;
        gap: 10px;
    }
}


</style>



























<body onload="initializeApp()">

    <!-- Navigation Bar -->
    <nav class="navbar">
        <h2 class="logo">Task Tracker</h2>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="JuniorProject.html">Project</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <!-- Main Content Wrapper -->
    <div class="container">

        <!-- Header -->
        <header class="app-header">
            <h1>Task Tracker</h1>
            <p class="subtitle">Manage and organize your tasks efficiently</p>
        </header>

        <!-- Task Input Section -->
        <section class="card">
            <div class="task-input-wrapper">
                <input type="text" id="taskInput" placeholder="Enter a new task..." aria-label="Task description">

                <select id="taskCategory" aria-label="Task category">
                    <option value="general">General</option>
                    <option value="school">School</option>
                    <option value="work">Work</option>
                    <option value="personal">Personal</option>
                </select>

                <select id="taskPriority" aria-label="Task priority">
                    <option value="low">Low Priority</option>
                    <option value="medium">Medium Priority</option>
                    <option value="high">High Priority</option>
                </select>

                <input type="date" id="taskDueDate" aria-label="Task due date">

                <button id="addTaskButton">Add Task</button>
            </div>
        </section>

        <!-- Filters -->
        <section class="card">
            <h2>Filters</h2>
            <div class="filter-buttons">
                <button data-filter="all" class="filter-btn active">All</button>
                <button data-filter="completed" class="filter-btn">Completed</button>
                <button data-filter="pending" class="filter-btn">Pending</button>
                <button data-filter="high" class="filter-btn">High Priority</button>
            </div>
        </section>

        <input type="text" id="searchBar" placeholder="Search tasks..." aria-label="Search tasks">

        <!-- Task List -->
        <section class="card">
            <h2>Your Tasks</h2>
            <ul id="taskContainer" class="task-list"></ul>
        </section>

        <section class="card">
            <h2>Progress</h2>
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
            </div>
        </section>

        <!-- Stats -->
        <section class="task-stats">
            <div class="stats-box">
                <h3 id="totalTasks">0</h3>
                <p>Total Tasks</p>
            </div>

            <div class="stats-box">
                <h3 id="completedTasks">0</h3>
                <p>Completed Tasks</p>
            </div>

            <div class="stats-box">
                <h3 id="pendingTasks">0</h3>
                <p>Pending Tasks</p>
            </div>
        </section>

    </div>

    <!-- Footer -->
    <footer class="app-footer">
        <p>Task Tracker © 2026 — Built for productivity</p>
    </footer>
    <script src="app.js"></script>
</body>

</html>
